<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kshitij Cyber Cafe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #eef2f7;
  --text: #000;
  --card: rgba(255,255,255,0.6);
}

body.dark {
  --bg: #0f172a;
  --text: #fff;
  --card: rgba(255,255,255,0.1);
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

/* TOGGLE */
.toggle {
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 6px;
  background: #0d6efd;
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  padding: 40px;
  animation: fadeIn 1s ease;
}

/* GLASS CARD */
.container {
  max-width: 400px;
  margin: auto;
}

.card {
  backdrop-filter: blur(10px);
  background: var(--card);
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  animation: slideUp 0.7s ease;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  background: #0d6efd;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #084298;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes slideUp {
  from {
    transform: translateY(30px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-area">
    <img src="logo.png" class="logo">
    <h3>Kshitij Cyber Cafe</h3>
  </div>

  <div class="toggle" onclick="toggleMode()">🌙</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>All Online Services</h1>
  <p>Fast • Secure • Reliable</p>
</div>

<div class="container">

  <!-- FORM -->
  <div class="card">
    <h3>Service Form</h3>

    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="text" id="service" placeholder="Service Required">

    <button id="submitBtn">Submit</button>
  </div>

  <!-- ADMIN LOGIN -->
  <div class="card">
    <h3>Admin Login</h3>

    <input type="text" id="username" placeholder="User ID">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>

</div>

<script>
// DARK MODE
function toggleMode(){
  document.body.classList.toggle("dark");
}

// FORM
document.getElementById("submitBtn").addEventListener("click", function(){
  let name = document.getElementById("name").value;
  let mobile = document.getElementById("mobile").value;
  let service = document.getElementById("service").value;

  if(!name || !mobile || !service){
    alert("Fill all fields ❌");
    return;
  }

  let data = {name, mobile, service};
  let allData = JSON.parse(localStorage.getItem("formData")) || [];

  allData.push(data);
  localStorage.setItem("formData", JSON.stringify(allData));

  alert("Submitted ✅");

  document.getElementById("name").value = "";
  document.getElementById("mobile").value = "";
  document.getElementById("service").value = "";
});

// LOGIN
function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "9305497875" && pass === "ASdf@12345"){
    window.location.href = "admin.html";
  } else {
    alert("Wrong details ❌");
  }
}
</script>

</body>
</html>

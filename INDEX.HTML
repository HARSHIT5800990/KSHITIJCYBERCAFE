<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kshitij Cyber Cafe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f1f5f9;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  background: #0d6efd;
  color: white;
}

.logo {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  margin-right: 10px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 40px;
  background: linear-gradient(to right, #0d6efd, #00c6ff);
  color: white;
}

/* CARD */
.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
}

button {
  padding: 10px 15px;
  background: #0d6efd;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #084298;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="logo">
  <h2>KSHITIJ CYBER CAFE</h2>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Welcome to Kshitij Cyber Cafe</h1>
  <p>All Online Services Available Here</p>
</div>

<div class="container">

  <!-- SERVICES -->
  <div class="card">
    <h3>Our Services</h3>
    <p>✔ Ayushman Card<br>✔ PAN Card<br>✔ Aadhar Services<br>✔ Online Forms</p>
  </div>

  <!-- ADMIN LOGIN -->
  <div class="card">
    <h3>Admin Login</h3>

    <input type="text" id="username" placeholder="Enter User ID"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>

    <button onclick="login()">Login</button>
  </div>

</div>
<div class="card">
  <h3>Fill Service Form</h3>

  <input type="text" id="name" placeholder="Full Name"><br>
  <input type="text" id="mobile" placeholder="Mobile Number"><br>
  <input type="text" id="service" placeholder="Service (PAN / Ayushman etc)"><br>

  <button onclick="saveData()">Submit</button>
</div>

<script>
function login() {
  var user = document.getElementById("username").value;
  var pass = document.getElementById("password").value;

  if(user === "9305497875" && pass === "ASdf@12345") {
    alert("Login Successful ✅");
    window.location.href = "admin.html";
  } else {
    alert("Wrong ID or Password ❌");
  }
}
</script>

</body>
</html>

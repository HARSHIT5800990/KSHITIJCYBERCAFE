<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kshitij Cyber Cafe</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  background: #0d6efd;
  color: white;
  padding: 10px 20px;
}

.logo {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  margin-right: 10px;
}

.container {
  padding: 20px;
}

/* BUTTON */
button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: #0d6efd;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #084298;
}

input {
  padding: 10px;
  margin: 5px;
  width: 250px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  margin: 10px 0;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="logo">
  <h2>KSHITIJ CYBER CAFE</h2>
</div>

<div class="container">

  <!-- SERVICES -->
  <div class="card">
    <h3>Our Services</h3>
    <p>Ayushman Card, PAN Card, Aadhar Services, Online Forms</p>
  </div>

  <!-- OTP LOGIN -->
  <div class="card">
    <h3>User Login (OTP)</h3>
    
    <input type="text" id="phone" placeholder="+91XXXXXXXXXX"><br>
    <button onclick="sendOTP()">Send OTP</button><br>

    <input type="text" id="otp" placeholder="Enter OTP"><br>
    <button onclick="verifyOTP()">Verify OTP</button>

    <div id="recaptcha-container"></div>
  </div>

  <!-- ADMIN LOGIN -->
  <div class="card">
    <h3>Admin Login</h3>
    
    <input type="text" id="adminUser" placeholder="Username"><br>
    <input type="password" id="adminPass" placeholder="Password"><br>
    <button onclick="adminLogin()">Login</button>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBf4vaN2kvzerrCL9BVBBF0Jo0jaCEajTY",
  authDomain: "kshitijcybercafe.netlify.app",
};

firebase.initializeApp(firebaseConfig);

window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');

// SEND OTP
function sendOTP() {
  var number = document.getElementById("phone").value;

  firebase.auth().signInWithPhoneNumber(number, window.recaptchaVerifier)
    .then(function (confirmationResult) {
      window.confirmationResult = confirmationResult;
      alert("OTP Sent");
    }).catch(function(error){
      alert(error.message);
    });
}

// VERIFY OTP
function verifyOTP() {
  var code = document.getElementById("otp").value;

  confirmationResult.confirm(code).then(function (result) {
    alert("Login Successful");
  }).catch(function(){
    alert("Wrong OTP");
  });
}

// ADMIN LOGIN
function adminLogin() {
  var user = document.getElementById("adminUser").value;
  var pass = document.getElementById("adminPass").value;

  if(user === "admin" && pass === "1234") {
    alert("Admin Login Success");
    window.location.href = "admin.html";
  } else {
    alert("Wrong Credentials");
  }
}
</script>

</body>
</html>
